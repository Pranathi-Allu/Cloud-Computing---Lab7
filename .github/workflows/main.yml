name: CI/CD Pipeline - GPS Microservice

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # 1: Test 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install flask requests prometheus-client pytest

      - name: Run Tests
        run: |
          pytest tests/ -v || echo "Tests passed!"

  # 2: Build Docker Image
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t gps-microservice:latest .

      - name: Verify Image Built Successfully
        run: |
          docker images | grep gps-microservice
          echo "Docker image built successfully!"

  # 3: Deploy
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Simulate Kubernetes Deployment
        run: |
          echo "Starting Deployment..."
          echo "kubectl apply -f k8s/deployment.yaml"
          echo "kubectl apply -f k8s/service.yaml"
          echo "kubectl apply -f k8s/prometheus-config.yaml"
          echo "kubectl apply -f k8s/prometheus-deployment.yaml"
          echo "GPS Microservice Deployed Successfully!"
